syntax = "proto3";
package com.corporatebanking.transaction;

option java_multiple_files = true;
option java_package = "com.corporatebanking.transaction.grpc";
option java_outer_classname = "getAllTransactionsProto";

service GetAllTransactionService {
    rpc GetAllTransactions(GetAllTransactionsRequest) returns (GetAllTransactionListResponse);
}

message GetAllTransactionsResponse {
    int64 id=1;
    repeated GetAllAccountType account_type=2;
    string accountNumber=3;
    string name=4;
    double amount=5;
    string note=6;
    string created_at=7;
    string updated_at=8;
}
message GetAllAccountType{
    int64 id=1;
    string name=2;
}

message GetAllTransactionsRequest {}

message GetAllTransactionListResponse {
    repeated GetAllTransactionsResponse transactions = 1;
}