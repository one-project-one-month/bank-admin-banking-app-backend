syntax = "proto3";

package com.corporatebanking.transaction;

option java_multiple_files = true;
option java_package = "com.corporatebanking.transaction.proto";
option java_outer_classname = "CreateTransactionProto";

service TransactionService {
  rpc CreateTransaction(CreateTransactionRequest) returns (CreateTransactionResponse);
}

message CreateTransactionRequest {
  int64 credit_account_id = 1;
  int64 debit_account_id = 2;
  string amount = 3;
  string transaction_type = 4;
  int64 transaction_group_id = 5;
}

message CreateTransactionResponse {
  bool success = 1;
  string message = 2;
  int64 transaction_id = 3;
  int64 transaction_group_id = 4;
}