syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.corporatebanking.transaction.grpc";
option java_outer_classname = "CreateTransactionProto";

package com.corporatebanking.transaction;

service CreateTransaction {
  rpc create (CreateTransactionRequest) returns (TransactionResponse);
}

message CreateTransactionRequest {
  int64  accountTypeId   = 1;
  string accountNumber   = 2;
  string name            = 3;
  double amount          = 4;
  string note            = 5;
  string created_at = 6;
  string updated_at = 7;
}


message AccountTypeData {
  int64  id   = 1;
  string name = 2;
}


message TransactionResponse {
  int64 id                 = 1;
  AccountTypeData accountType = 2;
  string accountNumber      = 3;
  string name               = 4;
  double amount             = 5;
  string note               = 6;
  string createdAt          = 7;
  string updatedAt          = 8;
}