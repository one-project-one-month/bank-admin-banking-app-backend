syntax = "proto3";

package com.corporatebanking.organization;

option java_multiple_files = true;
option java_package = "com.corporatebanking.organization.grpc";
option java_outer_classname = "OrganizationProto";

service OrganizationService {
  rpc CreateOrganization(CreateOrganizationRequest) returns (OrganizationResponse);
  
  rpc GetOrganization(GetOrganizationRequest) returns (OrganizationResponse);
  
  rpc GetAllOrganizations(GetAllOrganizationsRequest) returns (OrganizationListResponse);
  
  rpc UpdateOrganization(UpdateOrganizationRequest) returns (OrganizationResponse);
  
  rpc DeleteOrganization(DeleteOrganizationRequest) returns (DeleteOrganizationResponse);
}

message OrganizationResponse {
  int64 id = 1;
  string name = 2;
  string shortcode = 3;
  string address = 4;
  string country = 5;
  string created_at = 6;
  string updated_at = 7;
  int64 created_by = 8;
  int64 updated_by = 9;
}

message CreateOrganizationRequest {
  string name = 1;
  string shortcode = 2;
  string address = 3;
  string country = 4;
  int64 created_by = 5;
}

message GetOrganizationRequest {
  int64 id = 1;
}

message GetAllOrganizationsRequest {}

message UpdateOrganizationRequest {
  int64 id = 1;
  string name = 2;
  string shortcode = 3;
  string address = 4;
  string country = 5;
  int64 updated_by = 6;
}

message DeleteOrganizationRequest {
  int64 id = 1;
}

message OrganizationListResponse {
  repeated OrganizationResponse organizations = 1;
}

message DeleteOrganizationResponse {
  string message = 1;
}
