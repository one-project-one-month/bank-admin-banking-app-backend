syntax = "proto3";

package com.corporatebanking.nrc;

option java_multiple_files = true;
option java_package = "com.corporatebanking.nrc.grpc";
option java_outer_classname = "NrcProto";

service NrcService {
  rpc GetAllNrcCodes(GetAllNrcCodesRequest) returns (NrcCodeListResponse);
  rpc GetNrcValuesByCodeName(GetNrcValuesByCodeNameRequest) returns (NrcCodeValueListResponse);
}

message NrcCodeResponse {
  int64 id = 1;
  string name = 2;
}

message NrcCodeValueResponse {
  int64 id = 1;
  int64 code_id = 2;
  string value = 3;
}

message GetAllNrcCodesRequest {}

message GetNrcValuesByCodeNameRequest {
  string code_name = 1;
}

message NrcCodeListResponse {
  repeated NrcCodeResponse codes = 1;
}

message NrcCodeValueListResponse {
  repeated NrcCodeValueResponse values = 1;
}
