syntax = "proto3";

package com.corporatebanking.faq;

option java_multiple_files = true;
option java_package = "com.corporatebanking.faq.grpc";
option java_outer_classname = "FaqProto";

service FaqService{
    rpc CreateFaq(FaqRequest) returns (FaqResponse);
}

message FaqRequest{
    string question = 1;
    string answer = 2;
}

message FaqResponse{
    int64 id = 1;
    string question = 2;
    string answer = 3;
    string createdAt = 4;
}