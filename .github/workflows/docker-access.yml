name: Integration Tests

on:
  workflow_run:
    workflows: ["Change Detection"]
    types: [completed]

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    if: "${{ github.event.workflow_run.conclusion == 'success' }}"
    env:
      CORPORATE_DB_URL: ${{ secrets.CORPORATE_DB_URL }}
      CORPORATE_DB_USERNAME: ${{ secrets.CORPORATE_DB_USERNAME }}
      CORPORATE_DB_PASSWORD: ${{ secrets.CORPORATE_DB_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: matrix-artifact
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - id: matrix
        run: echo "matrix=$(cat matrix.json)" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v1

      - name: Build changed services
        run: |
          MATRIX=$(echo '${{ steps.matrix.outputs.matrix }}' | jq -r '.[]')
          [ -z "$MATRIX" ] && echo "No changed services." && exit 0

          cat > Dockerfile.generated <<'EOF'
          FROM openjdk:17-jdk-slim
          ARG JAR_PATH
          COPY ${JAR_PATH} /app.jar
          ENTRYPOINT ["java","-jar","/app.jar"]
          EOF

          for s in $MATRIX; do
            mvn -B -DskipTests -f app/$s/pom.xml clean package || exit 1
            jar=$(find app/$s/target -name '*.jar' | head -n 1)
            [ -z "$jar" ] && echo "No JAR for $s" && exit 1
            docker build -t $s:latest --build-arg JAR_PATH=$jar -f Dockerfile.generated .
          done

      - name: Run containers
        run: |
          MATRIX=$(echo '${{ steps.matrix.outputs.matrix }}' | jq -r '.[]')
          [ -z "$MATRIX" ] && exit 0
          
          docker network create banknet || true

          docker run -d --name kafka --network banknet -p 9092:9092 \
            -e KAFKA_NODE_ID=1 \
            -e KAFKA_PROCESS_ROLES=broker,controller \
            -e KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093 \
            -e KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,CONTROLLER://kafka:9093 \
            -e KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092 \
            -e KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER \
            -e KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT \
            -e KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT \
            apache/kafka:4.0.1-rc2

          for service in $MATRIX; do
            case $service in
              "transaction-service")
                docker run -d --name transaction-service --network banknet -p 1001:1001 -p 9095:9095 transaction-service:latest
                ;; 
              "faq-service")
                docker run -d --name faq-service --network banknet -p 2001:2001 -p 9094:9094 faq-service:latest
                ;; 
              "nrc-service")
                docker run -d --name nrc-service --network banknet -p 3002:3002 -p 9093:9093 nrc-service:latest
                ;; 
              "user-service")
                docker run -d --name user-service --network banknet -p 3001:3001 -p 9091:9091 user-service:latest
                ;; 
              "mail-service")
                docker run -d --name mail-service --network banknet -p 7000:7000 mail-service:latest
                ;; 
              "upload-service")
                docker run -d --name upload-service --network banknet -p 8001:8000 upload-service:latest
                ;; 
              "auth-service")
                docker run -d --name auth-service --network banknet -p 9999:9999 \
                  -e DB_URL=$CORPORATE_DB_URL \
                  -e DB_USERNAME=$CORPORATE_DB_USERNAME \
                  -e DB_PASSWORD=$CORPORATE_DB_PASSWORD \
                  auth-service:latest
                ;; 
              "gateway-service")
                docker run -d --name gateway-service --network banknet -p 8080:8080 gateway-service:latest
                ;; 
            esac
          done

      - name: Wait for services to be healthy
        run: |
          #!/bin/bash
          set -e
          TIMEOUT=180
          INTERVAL=5

          declare -A SERVICES=(
            ["gateway-service"]="http://localhost:8080/health"
            ["auth-service"]="http://localhost:9999/health"
            ["user-service"]="http://localhost:3001/health"
            ["transaction-service"]="http://localhost:1001/health"
          )

          MATRIX_JSON='${{ steps.matrix.outputs.matrix }}'
          STARTED_SERVICES=$(echo "$MATRIX_JSON" | jq -r '.[]')

          declare -A services_to_check
          for service in "${!SERVICES[@]}"; do
            if echo "$STARTED_SERVICES" | grep -q "$service"; then
              services_to_check[$service]=${SERVICES[$service]}
            fi
          done

          if [ ${#services_to_check[@]} -eq 0 ]; then
            exit 0
          fi

          start_time=$(date +%s)
          while true; do
            all_healthy=1
            for service in "${!services_to_check[@]}"; do
              url=${services_to_check[$service]}
              status_code=$(curl -s -o /dev/null -w "%{http_code}" "$url" || echo "000")

              if [ "$status_code" = "200" ]; then
                unset services_to_check[$service]
              else
                all_healthy=0
              fi
            done

            if [ ${#services_to_check[@]} -eq 0 ]; then
              exit 0
            fi

            current_time=$(date +%s)
            elapsed_time=$((current_time - start_time))
            if [ $elapsed_time -ge $TIMEOUT ]; then
              exit 1
            fi

            sleep $INTERVAL
          done

      - name: Cleanup
        if: always()
        run: |
          docker rm -f $(docker ps -aq) 2>/dev/null || true
          docker network rm banknet 2>/dev/null || true
