name: Integration Tests

on:
  pull_request:
    branches:
      - dev

jobs:
  run-integration-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker Images
        run: docker-compose -f app/infra/docker-compose.yaml build

      - name: Start Services
        env:
          # secrets need to be created in your repository's settings
          # Settings > Secrets and variables > Actions
          CORPORATE_DB_URL: ${{ secrets.CORPORATE_DB_URL }}
          CORPORATE_DB_USERNAME: ${{ secrets.CORPORATE_DB_USERNAME }}
          CORPORATE_DB_PASSWORD: ${{ secrets.CORPORATE_DB_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO: ${{ github.event.repository.name }}
          GITHUB_TARGET_FOLDER: 'data' # Example folder
        run: docker-compose -f app/infra/docker-compose.yaml up -d

      - name: Wait for Services to be Healthy
        run: |
          #!/bin/bash
          set -e
          
          TIMEOUT=180
          INTERVAL=5
          
          # --- Define services and their health check endpoints ---
          # The ports are the host machine ports from your docker-compose.yaml
          declare -A SERVICES
          SERVICES=(
            ["gateway-service"]="http://localhost:8080/health"
            ["auth-service"]="http://localhost:9999/health"
            ["user-service"]="http://localhost:3001/health"
            ["transaction-service"]="http://localhost:1001/health"
          )
          # ---
          
          declare -A healthy_services
          for service in "${!SERVICES[@]}"; do
            healthy_services[$service]=0
          done
          
          start_time=$(date +%s)
          
          while true; do
            all_healthy=1
            for service in "${!SERVICES[@]}"; do
              url=${SERVICES[$service]}
              if [ ${healthy_services[$service]} -eq 0 ]; then
                echo "Checking health of $service at $url..."
                status_code=$(curl -s -o /dev/null -w "%{http_code}" "$url" || echo "000")
                
                if [ "$status_code" -eq 200 ]; then
                  echo "$service is healthy!"
                  healthy_services[$service]=1
                else
                  echo "$service is not healthy yet (status: $status_code)."
                  all_healthy=0
                fi
              fi
            done
            
            if [ $all_healthy -eq 1 ]; then
              echo "All services are healthy!"
              exit 0
            fi
            
            current_time=$(date +%s)
            elapsed_time=$((current_time - start_time))
            
            if [ $elapsed_time -ge $TIMEOUT ]; then
              echo "Timeout reached. Not all services are healthy."
              echo "Final health check status:"
              for service in "${!SERVICES[@]}"; do
                if [ ${healthy_services[$service]} -eq 0 ]; then
                  echo "- $service: FAILED"
                else
                  echo "- $service: OK"
                fi
              done
              exit 1
            fi
            
            sleep $INTERVAL
          done

      - name: Run Integration Test Suite
        run: |
          echo "****************************************************************"
          echo "* TODO: Add your integration test command here.                *"
          echo "* For example:                                                 *"
          echo "*   mvn -B test -f integration-tests/pom.xml                   *"
          echo "****************************************************************"
          # This command will fail the step to remind you to add real tests.
          exit 1

      - name: Show Docker Logs on Failure
        if: failure()
        run: docker-compose -f app/infra/docker-compose.yaml logs

      - name: Tear Down Services
        if: always() # Always run this step to clean up the environment
        run: docker-compose -f app/infra/docker-compose.yaml down
