name: Build Services

on:
  workflow_run:
    workflows: ["Detect Changes"]
    types:
      - completed

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      security-events: write
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download matrix artifact
        uses: actions/download-artifact@v4
        with:
          name: matrix-artifact
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
        continue-on-error: true
      
      - name: Read matrix from file
        id: matrix
        run: |
          if [ -f "matrix.json" ]; then
            MATRIX_CONTENT=$(cat matrix.json)
            echo "matrix=$MATRIX_CONTENT" >> $GITHUB_OUTPUT
            echo "has-changes=true" >> $GITHUB_OUTPUT
          else
            echo "matrix=[]" >> $GITHUB_OUTPUT
            echo "has-changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Exit if no changes
        if: steps.matrix.outputs.has-changes == 'false'
        run: exit 0

      - name: Set output for next job
        id: set-output
        run: |
          echo "matrix=${{ steps.matrix.outputs.matrix }}" >> $GITHUB_OUTPUT
          echo "has-changes=${{ steps.matrix.outputs.has-changes }}" >> $GITHUB_OUTPUT

    outputs:
      matrix: ${{ steps.set-output.outputs.matrix }}
      has-changes: ${{ steps.set-output.outputs.has-changes }}

  maven-build:
    needs: build
    if: needs.build.outputs.has-changes == 'true'
    permissions:
      security-events: write
      contents: read
    strategy:
      matrix:
        service: ${{ fromJson(needs.build.outputs.matrix) }}
    
    uses: ./.github/workflows/maven-ci.yml
    with:
      service: ${{ matrix.service }}