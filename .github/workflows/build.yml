name: Build Services

on:
  workflow_call:
    inputs:
      matrix:
        required: true
        type: string
      has-changes:
        required: true
        type: string
      parent-pom-changed:
        required: true
        type: string
      sha:
        required: true
        type: string

jobs:
  build-parent:
    if: inputs.parent-pom-changed == 'true'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-parent-${{ hashFiles('app/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-parent-
            ${{ runner.os }}-maven-

      - name: Build parent POM
        working-directory: app
        run: mvn clean install -N -DskipTests

  build-services:
    needs: [build-parent]
    if: |
      always() && 
      inputs.has-changes == 'true' &&
      (needs.build-parent.result == 'success' || needs.build-parent.result == 'skipped')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        service: ${{ fromJson(inputs.matrix) }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('app/pom.xml', format('app/{0}/pom.xml', matrix.service)) }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Cache service build
        uses: actions/cache@v4
        with:
          path: |
            app/${{ matrix.service }}/target/classes
            app/${{ matrix.service }}/target/generated-sources
          key: ${{ runner.os }}-${{ matrix.service }}-${{ hashFiles(format('app/{0}/pom.xml', matrix.service)) }}-${{ hashFiles(format('app/{0}/src/**', matrix.service)) }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.service }}-${{ hashFiles(format('app/{0}/pom.xml', matrix.service)) }}-
            ${{ runner.os }}-${{ matrix.service }}-

      - name: Check if proto files exist
        id: check-proto
        run: |
          if [ -d "app/${{ matrix.service }}/src/main/proto" ]; then
            echo "has-proto=true" >> $GITHUB_OUTPUT
          else
            echo "has-proto=false" >> $GITHUB_OUTPUT
          fi

      - name: Install parent POM
        working-directory: app
        run: mvn install -N -DskipTests -q
      
      - name: Generate protobuf sources
        if: steps.check-proto.outputs.has-proto == 'true'
        working-directory: app
        run: mvn generate-sources -pl infra/protos,${{ matrix.service }} -am

      - name: Build service with dependencies
        working-directory: app
        run: |
          mvn clean install -e -pl infra/protos,${{ matrix.service }} -am -DskipTests
        continue-on-error: false

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}-jar
          path: |
            app/${{ matrix.service }}/target/*.jar
            !app/${{ matrix.service }}/target/*-sources.jar
            !app/${{ matrix.service }}/target/*-javadoc.jar
          retention-days: 7
          if-no-files-found: warn