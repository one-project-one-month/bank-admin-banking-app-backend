name: Change Detection

on:
  push:
    branches:
      - dev
      - "ft/**"
  pull_request:
    branches:
      - dev
      - "ft/**"

# concurrency:
#   group: ${{ github.workflow }}-${{ github.ref }}
#   cancel-in-progress: false

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has-changes: ${{ steps.set-matrix.outputs.has-changes }}
      parent-pom-changed: ${{ steps.check-parent.outputs.changed }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check parent POM changes
        id: check-parent
        uses: dorny/paths-filter@v3
        with:
          filters: |
            changed:
              - 'app/pom.xml'

      - name: Check service changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            auth-service:
              - 'app/auth-service/**'
            faq-service:
              - 'app/faq-service/**'
            gateway-service:
              - 'app/gateway-service/**'
            mail-service:
              - 'app/mail-service/**'
            nrc-service:
              - 'app/nrc-service/**'
            transaction-service:
              - 'app/transaction-service/**'
            upload-service:
              - 'app/upload-service/**'
            user-service:
              - 'app/user-service/**'
            workflow:
              - '.github/workflows/**'

      - name: Build service matrix
        id: set-matrix
        uses: actions/github-script@v7
        with:
          script: |
            const allServices = [
              'auth-service',
              'faq-service', 
              'gateway-service',
              'mail-service',
              'nrc-service',
              'transaction-service',
              'upload-service',
              'user-service'
            ];
            
            const parentChanged = '${{ steps.check-parent.outputs.changed }}' === 'true';
            const workflowChanged = '${{ steps.filter.outputs.workflow }}' === 'true';
            
            let services = [];
            
            if (parentChanged || workflowChanged) {
              services = allServices;
            } else {
              const filters = {
                'auth-service': '${{ steps.filter.outputs.auth-service }}',
                'faq-service': '${{ steps.filter.outputs.faq-service }}',
                'gateway-service': '${{ steps.filter.outputs.gateway-service }}',
                'mail-service': '${{ steps.filter.outputs.mail-service }}',
                'nrc-service': '${{ steps.filter.outputs.nrc-service }}',
                'transaction-service': '${{ steps.filter.outputs.transaction-service }}',
                'upload-service': '${{ steps.filter.outputs.upload-service }}',
                'user-service': '${{ steps.filter.outputs.user-service }}'
              };
              
              services = Object.keys(filters).filter(service => filters[service] === 'true');
            }
            
            const matrix = JSON.stringify(services);
            const hasChanges = services.length > 0;
            
            core.setOutput('matrix', matrix);
            core.setOutput('has-changes', hasChanges.toString());
  call-build:
      needs: detect-changes
      if: needs.detect-changes.outputs.has-changes == 'true'
      uses: ./.github/workflows/build.yml
      with:
        matrix: ${{ needs.detect-changes.outputs.matrix }}
        has-changes: ${{ needs.detect-changes.outputs.has-changes }}
        parent-pom-changed: ${{ needs.detect-changes.outputs.parent-pom-changed }}
        sha: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      secrets: inherit

  call-publish:
      needs: [detect-changes, call-build]
      if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
      uses: ./.github/workflows/publish.yml
      with:
        matrix: ${{ needs.detect-changes.outputs.matrix }}
        sha: ${{ github.sha }}
      secrets: inherit
