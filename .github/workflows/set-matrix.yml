name: Build and Test Services

on:
  push:
    branches:
      - dev
      - ft/**
  pull_request:
    branches:
      - dev
      - ft/**


jobs:
  set-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has-changes: ${{ steps.set-matrix.outputs.has-changes }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      
      - name: Detect changed services
        id: set-matrix
        shell: bash
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            git fetch origin ${{ github.base_ref }} --quiet
            BASE_REF=$(git merge-base origin/${{ github.base_ref }} HEAD)
            HEAD_REF="${{ github.event.pull_request.head.sha }}"
          else
            BASE_REF="${{ github.event.before }}"
            HEAD_REF="${{ github.sha }}"
            if [ "$BASE_REF" = "0000000000000000000000000000000000000000" ] || [ -z "$BASE_REF" ]; then
              BASE_REF="HEAD~1"
              if ! git rev-parse HEAD~1 >/dev/null 2>&1;then
                BASE_REF=""
              fi
            fi
          fi
          if [ -z "$BASE_REF" ]; then
            CHANGED_FILES=""
          else
            CHANGED_FILES=$(git diff --name-only $BASE_REF $HEAD_REF 2>/dev/null || echo "")
          fi
          if [ -z "$CHANGED_FILES" ]; then
            CHANGED_SERVICES=$(find app -mindepth 1 -maxdepth 1 -type d -exec basename {} \\;)
          else
            CHANGED_SERVICES=$(echo "$CHANGED_FILES" | grep '^app/' | awk -F'/' '{print $2}' | sort -u || true)
            if echo "$CHANGED_FILES" | grep -q '^shared/'; then
              CHANGED_SERVICES=$(find app -mindepth 1 -maxdepth 1 -type d -exec basename {} \\;)
            fi
            if echo "$CHANGED_FILES" | grep -q '^.github/workflows/'; then
              CHANGED_SERVICES=$(find app -mindepth 1 -maxdepth 1 -type d -exec basename {} \\;)
            fi
            if echo "$CHANGED_FILES" | grep -qE '^(pom.xml|build.gradle|settings.gradle|gradle.properties)$'; then
              CHANGED_SERVICES=$(find app -mindepth 1 -maxdepth 1 -type d -exec basename {} \\;)
            fi
          fi
          CHANGED_SERVICES=$(echo "$CHANGED_SERVICES" | grep -v '^$' | grep -vE '^(example-service|infra|..*|node_modules|target|build)$' || true)
          if [ ! -d "app" ]; then
            echo "matrix=[]" >> $GITHUB_OUTPUT
            echo "has-changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          if [ -z "$CHANGED_SERVICES" ]; then
            echo "matrix=[]" >> $GITHUB_OUTPUT
            echo "has-changes=false" >> $GITHUB_OUTPUT
          else
            MATRIX=$(echo "$CHANGED_SERVICES" | jq -R -s -c 'split("\n") | map(select(length > 0))' 2>/dev/null || echo "[]")
            if [ "$MATRIX" = "[]" ] || [ -z "$MATRIX" ]; then
              echo "matrix=[]" >> $GITHUB_OUTPUT
              echo "has-changes=false" >> $GITHUB_OUTPUT
            else
              echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
              echo "has-changes=true" >> $GITHUB_OUTPUT
            fi
          fi
      
      - name: Save matrix to file
        if: steps.set-matrix.outputs.has-changes == 'true'
        run: echo '${{ steps.set-matrix.outputs.matrix }}' > matrix.json

      - name: Upload matrix artifact
        if: steps.set-matrix.outputs.has-changes == 'true'
        uses: actions/upload-artifact@v3
        with:
          name: matrix-artifact
          path: matrix.json
          retention-days: 1

  build:
    needs: set-matrix
    if: needs.set-matrix.outputs.has-changes == 'true'
    permissions:
      security-events: write
    strategy:
      matrix:
        service: ${{ fromJson(needs.set-matrix.outputs.matrix) }}
    
    uses: ./.github/workflows/maven-ci.yml
    with:
      service: ${{ matrix.service }}

  lint:
    name: Run Code Linter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Super-Linter
        uses: github/super-linter@v5
        env:
          VALIDATE_ALL_CODE_BASE: true
          DEFAULT_BRANCH: dev
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
