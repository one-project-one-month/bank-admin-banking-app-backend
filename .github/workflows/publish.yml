name: Publish Services

on:
  workflow_call:
    inputs:
      matrix:
        required: true
        type: string
      sha:
        required: true
        type: string

jobs:
  publish-services:
    if: fromJson(inputs.matrix) != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(inputs.matrix) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.service }}-jar
          path: app/${{ matrix.service }}/target

      - name: Display structure of downloaded files
        run: ls -R app/${{ matrix.service }}/target

      - name: Set image tag
        id: meta
        run: echo "tag=YOUR_DOCKERHUB_USERNAME/${{ matrix.service }}:${{ inputs.sha }}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: app/${{ matrix.service }}
          file: app/${{ matrix.service }}/Dockerfile
          push: false
          tags: ${{ steps.meta.outputs.tag }}
          load: true

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.meta.outputs.tag }}
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Push Docker image
        run: docker push ${{ steps.meta.outputs.tag }}
