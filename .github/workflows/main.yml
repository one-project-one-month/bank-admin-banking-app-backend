name: Set Matrix

on:
  push:
    branches:
      - dev
      - ft/**
  pull_request:
    branches:
      - dev
      - ft/**


jobs:
  set-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has-changes: ${{ steps.set-matrix.outputs.has-changes }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Ensure we checkout the correct ref for PRs
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      
      - name: Detect changed services
        id: set-matrix
        run: |
          echo " Detecting changed services..."
          
          # Determine base commit for comparison
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            # For PRs, use merge-base for accurate diff
            git fetch origin ${{ github.base_ref }}
            BASE_REF=$(git merge-base origin/${{ github.base_ref }} HEAD)
            HEAD_REF="${{ github.event.pull_request.head.sha }}"
            echo " PR Mode: Comparing $BASE_REF...$HEAD_REF"
          else
            # For push events, compare with previous commit
            BASE_REF="${{ github.event.before }}"
            HEAD_REF="${{ github.sha }}"
            
            # Handle first push (before is all zeros) or empty base
            if [ "$BASE_REF" = "0000000000000000000000000000000000000000" ] || [ -z "$BASE_REF" ]; then
              echo "  First push or invalid base - comparing with HEAD~1"
              BASE_REF="HEAD~1"
              # If HEAD~1 doesn't exist (initial commit), build all services
              if ! git rev-parse HEAD~1 >/dev/null 2>&1; then
                echo "  Initial commit detected - will build all services"
                BASE_REF=""
              fi
            fi
            echo " Push Mode: Comparing $BASE_REF...$HEAD_REF"
          fi
          
          # Get changed files
          if [ -z "$BASE_REF" ]; then
            echo "  No base ref - building all services"
            CHANGED_FILES=""
          else
            CHANGED_FILES=$(git diff --name-only $BASE_REF $HEAD_REF 2>/dev/null || echo "")
          fi
          
          # Determine which services to build
          if [ -z "$CHANGED_FILES" ]; then
            echo "  No changes detected or first commit - will build all services"
            CHANGED_SERVICES=$(find services -mindepth 1 -maxdepth 1 -type d -exec basename {} \;)
          else
            echo " Changed files:"
            echo "$CHANGED_FILES"
            
            # Extract unique service names from services/ directory
            CHANGED_SERVICES=$(echo "$CHANGED_FILES" | grep '^services/' | awk -F'/' '{print $2}' | sort -u || true)
            
            # Check if shared code changed - rebuild all if so
            if echo "$CHANGED_FILES" | grep -q '^shared/'; then
              echo " Shared code changed - will build all services"
              CHANGED_SERVICES=$(find services -mindepth 1 -maxdepth 1 -type d -exec basename {} \;)
            fi
            
            # Check if workflow files changed - rebuild all for safety
            if echo "$CHANGED_FILES" | grep -q '^\.github/workflows/'; then
              echo " Workflow changed - will build all services"
              CHANGED_SERVICES=$(find services -mindepth 1 -maxdepth 1 -type d -exec basename {} \;)
            fi
            
            # Check if root-level dependency files changed (pom.xml, etc.)
            if echo "$CHANGED_FILES" | grep -qE '^(pom\.xml|build\.gradle|settings\.gradle|gradle\.properties)$'; then
              echo " Root dependency file changed - will build all services"
              CHANGED_SERVICES=$(find services -mindepth 1 -maxdepth 1 -type d -exec basename {} \;)
            fi
          fi
          
          # Remove empty lines and filter out non-service directories
          CHANGED_SERVICES=$(echo "$CHANGED_SERVICES" | grep -v '^$' | grep -vE '^(example-service|\..*|node_modules|target|build)$' || true)
          
          # Validate that services directory exists
          if [ ! -d "services" ]; then
            echo " Error: services directory not found"
            echo "matrix=[]" >> $GITHUB_OUTPUT
            echo "has-changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          if [ -z "$CHANGED_SERVICES" ]; then
            echo "ℹ  No services to build"
            echo "matrix=[]" >> $GITHUB_OUTPUT
            echo "has-changes=false" >> $GITHUB_OUTPUT
          else
            echo " Services to build:"
            echo "$CHANGED_SERVICES"
            
            # Convert to JSON array format with error handling
            MATRIX=$(echo "$CHANGED_SERVICES" | jq -R -s -c 'split("\n") | map(select(length > 0))' 2>/dev/null || echo "[]")
            
            if [ "$MATRIX" = "[]" ] || [ -z "$MATRIX" ]; then
              echo "  Matrix is empty after JSON conversion"
              echo "matrix=[]" >> $GITHUB_OUTPUT
              echo "has-changes=false" >> $GITHUB_OUTPUT
            else
              echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
              echo "has-changes=true" >> $GITHUB_OUTPUT
              echo " Matrix output: $MATRIX"
            fi
          fi
        shell: bash
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
